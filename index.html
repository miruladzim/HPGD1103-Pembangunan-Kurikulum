/* ═════════════════════════════════════════════════════════════════��[...]
   CSS VARIABLES — iOS-inspired Dark (default) + Light overrides
══════════════════════════════════════════════════════════════════ *[...]
:root {
  /* Dark theme — deep matte navy, not pitch black */
  --bg:        #0e0f14;
  --bg2:       #14161d;
  --bg3:       #1a1c26;
  /* Frosted glass cards */
  --card:      rgba(255,255,255,0.055);
  --card-solid: #1c1e2a;
  --card2:     rgba(255,255,255,0.03);
  --border:    rgba(255,255,255,0.09);
  --border2:   rgba(255,255,255,0.05);
  --text:      #f2f4f8;
  --text2:     #b8bfd4;
  --muted:     #6e7a96;
  /* iOS accent palette */
  --blue:      #4f9eff;
  --blue2:     #75b6ff;
  --indigo:    #7b8cff;
  --purple:    #bf94ff;
  --teal:      #33d4be;
  --green:     #34d988;
  --green2:    #5ee8a4;
  --amber:     #ffca44;
  --amber2:    #ffd96a;
  --rose:      #ff6b8a;
  --rose2:     #ff9cae;
  --gold:      #ffb830;
  /* topic chips */
  --t1: #9f72ff; --t1b: rgba(159,114,255,0.15);
  --t2: #33c4d4; --t2b: rgba(51,196,212,0.15);
  --t3: #34d988; --t3b: rgba(52,217,136,0.15);
  --t4: #ffca44; --t4b: rgba(255,202,68,0.15);
  --t5: #ff6b8a; --t5b: rgba(255,107,138,0.15);
  --t6: #4f9eff; --t6b: rgba(79,158,255,0.15);
  --t7: #9f72ff; --t7b: rgba(159,114,255,0.15);
  --t8: #33c4d4; --t8b: rgba(51,196,212,0.15);
  --t9: #34d988; --t9b: rgba(52,217,136,0.15);
  --t10:#ffca44; --t10b:rgba(255,202,68,0.15);
  --radius: 18px;
  --radius-sm: 12px;
  --shadow: 0 8px 32px rgba(0,0,0,0.45);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.3);
  /* Glass effect tokens */
  --glass-bg: rgba(255,255,255,0.06);
  --glass-bg-hover: rgba(255,255,255,0.09);
  --glass-border: rgba(255,255,255,0.1);
  --glass-blur: blur(20px);
  --glass-blur-sm: blur(12px);
  /* Gradient accent */
  --accent-grad: linear-gradient(135deg, #7b8cff, #4f9eff);
  --accent-grad-warm: linear-gradient(135deg, #ffca44, #ff9a44);
  --accent-glow: rgba(123,140,255,0.35);
}

[data-theme="light"] {
  --bg:        #f0f2f8;
  --bg2:       #e8ebf5;
  --bg3:       #dfe3f0;
  --card:      rgba(255,255,255,0.72);
  --card-solid: #ffffff;
  --card2:     rgba(255,255,255,0.5);
  --border:    rgba(0,0,0,0.07);
  --border2:   rgba(0,0,0,0.04);
  --text:      #1a1d2e;
  --text2:     #3d4566;
  --muted:     #8892b0;
  --blue:      #2b7fff;
  --blue2:     #1a6aee;
  --indigo:    #5461f5;
  --purple:    #8b5cf6;
  --teal:      #0db8a4;
  --green:     #12b86a;
  --green2:    #0ea35f;
  --amber:     #d4920a;
  --amber2:    #b87a05;
  --rose:      #e8305a;
  --rose2:     #c8204a;
  --gold:      #c97d10;
  --t1: #7c3aed; --t1b: rgba(124,58,237,0.1);
  --t2: #0891b2; --t2b: rgba(8,145,178,0.1);
  --t3: #059669; --t3b: rgba(5,150,105,0.1);
  --t4: #d97706; --t4b: rgba(217,119,6,0.1);
  --t5: #db2777; --t5b: rgba(219,39,119,0.1);
  --t6: #2563eb; --t6b: rgba(37,99,235,0.1);
  --t7: #7c3aed; --t7b: rgba(124,58,237,0.1);
  --t8: #0891b2; --t8b: rgba(8,145,178,0.1);
  --t9: #059669; --t9b: rgba(5,150,105,0.1);
  --t10:#d97706; --t10b:rgba(217,119,6,0.1);
  --shadow: 0 8px 32px rgba(60,80,160,0.1);
  --shadow-sm: 0 2px 12px rgba(60,80,160,0.07);
  --glass-bg: rgba(255,255,255,0.65);
  --glass-bg-hover: rgba(255,255,255,0.82);
  --glass-border: rgba(255,255,255,0.8);
  --accent-grad: linear-gradient(135deg, #5461f5, #2b7fff);
  --accent-grad-warm: linear-gradient(135deg, #d4920a, #e8630a);
  --accent-glow: rgba(84,97,245,0.25);
}
